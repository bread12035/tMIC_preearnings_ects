apiVersion: apps/v1
kind: Deployment
metadata:
  name: ects
  namespace: tmic
spec:
  replicas: 2
  selector:
    matchLabels: { app: ects }
  template:
    metadata:
      labels: { app: ects }
      annotations:
        config-hash/shared: "REPLACE_AT_DEPLOY"
        config-hash/workflow: "REPLACE_AT_DEPLOY"
        config-hash/secret: "REPLACE_AT_DEPLOY"
    spec:
      serviceAccountName: earnings-intel-sa
      terminationGracePeriodSeconds: 60

      volumes:
        - name: env-shared
          configMap:
            name: earnings-intel-shared-config
        - name: env-workflow
          configMap:
            name: earnings-intel-ects-config
        - name: env-secret
          secret:
            secretName: earnings-intel-secret
        - name: app-env
          emptyDir: {}

      initContainers:
        - name: env-builder
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              {
                cat /config-shared/shared.env
                printf "\n"
                cat /config-workflow/workflow.env
                printf "\n"
                cat /secret/secret.env
                printf "\n"
              } > /app-env/.env
              chmod 0400 /app-env/.env
          volumeMounts:
            - { name: env-shared,   mountPath: /config-shared,   readOnly: true }
            - { name: env-workflow, mountPath: /config-workflow, readOnly: true }
            - { name: env-secret,   mountPath: /secret,          readOnly: true }
            - { name: app-env,      mountPath: /app-env }

      containers:
        - name: app
          image: REGION-docker.pkg.dev/PROJECT/REPO/earnings-intel:VERSION
          workingDir: /app
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: "my-gcp-project"
          volumeMounts:
            - name: app-env
              mountPath: /app/.env
              subPath: .env
              readOnly: true
          # ECTS parses parquet -> larger memory headroom than pre-earnings
          resources:
            requests: { cpu: "300m", memory: "1Gi" }
            limits:   { cpu: "2",    memory: "4Gi" }
          readinessProbe:
            exec: { command: ["/bin/sh", "-c", "test -f /tmp/ready"] }
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["/bin/sh", "-c", "test -f /tmp/alive"] }
            periodSeconds: 30
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ects-hpa
  namespace: tmic
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ects
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: External
      external:
        metric:
          name: pubsub.googleapis.com|subscription|num_undelivered_messages
          selector:
            matchLabels:
              resource.labels.subscription_id: earnings-events-ects-sub
        target:
          type: AverageValue
          averageValue: "5"
